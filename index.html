<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Pranayama</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #07080a;
      --border: rgba(255,255,255,0.06);
      --border-hover: rgba(125, 211, 224, 0.35);
      --text: #e8e6e1;
      --text-muted: rgba(232, 230, 225, 0.45);
      --text-dim: rgba(232, 230, 225, 0.3);
      --teal: #7DD3E0;
      --inhale: #5DA9E9;
      --hold-in: #B794F4;
      --exhale: #48BB78;
      --hold-out: #F6AD55;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed;
      top: 18%;
      left: 50%;
      transform: translateX(-50%);
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(125, 211, 224, 0.08) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: 4rem 1.75rem 2.5rem;
      max-width: 480px;
      margin: 0 auto;
    }

    .greeting {
      text-align: center;
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeIn 1s ease-out 0.1s forwards;
    }

    .orb-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeIn 1.2s ease-out 0.3s forwards;
    }

    .orb {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, rgba(125, 211, 224, 0.9), rgba(125, 211, 224, 0.15) 70%);
      box-shadow:
        0 0 30px rgba(125, 211, 224, 0.3),
        0 0 60px rgba(125, 211, 224, 0.15),
        inset 0 0 20px rgba(255, 255, 255, 0.1);
      animation: breathe 6s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { transform: scale(0.85); opacity: 0.75; }
      50%       { transform: scale(1.1);  opacity: 1;    }
    }

    .question {
      text-align: center;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 2.4rem;
      line-height: 1.2;
      color: var(--teal);
      margin-bottom: 0.5rem;
      opacity: 0;
      animation: fadeIn 1s ease-out 0.5s forwards;
    }

    .subtitle {
      text-align: center;
      font-size: 0.8rem;
      font-weight: 300;
      color: var(--text-muted);
      margin-bottom: 3rem;
      letter-spacing: 0.02em;
      opacity: 0;
      animation: fadeIn 1s ease-out 0.7s forwards;
    }

    .emotions {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    .emotion {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1.1rem 1.35rem;
      background: rgba(255, 255, 255, 0.015);
      border: 1px solid var(--border);
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1);
      opacity: 0;
      animation: slideUp 0.7s ease-out forwards;
      -webkit-tap-highlight-color: transparent;
      width: 100%;
      text-align: left;
    }

    .emotion:nth-child(1) { animation-delay: 0.85s; }
    .emotion:nth-child(2) { animation-delay: 0.95s; }
    .emotion:nth-child(3) { animation-delay: 1.05s; }
    .emotion:nth-child(4) { animation-delay: 1.15s; }
    .emotion:nth-child(5) { animation-delay: 1.25s; }

    .emotion:hover, .emotion:active {
      background: rgba(125, 211, 224, 0.04);
      border-color: var(--border-hover);
      transform: translateX(2px);
    }

    .emotion.selected {
      background: rgba(125, 211, 224, 0.06);
      border-color: var(--teal);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      box-shadow: 0 0 12px currentColor;
    }

    .dot.inhale   { background: var(--inhale);   color: var(--inhale); }
    .dot.hold-in  { background: var(--hold-in);  color: var(--hold-in); }
    .dot.exhale   { background: var(--exhale);   color: var(--exhale); }
    .dot.hold-out { background: var(--hold-out); color: var(--hold-out); }
    .dot.ease     { background: var(--text); color: var(--text); opacity: 0.6; }

    .emotion-text { flex: 1; }

    .emotion-name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: 1.3rem;
      color: var(--text);
      line-height: 1.2;
      margin-bottom: 0.15rem;
      display: block;
    }

    .emotion-meta {
      font-size: 0.72rem;
      font-weight: 300;
      color: var(--text-muted);
      letter-spacing: 0.02em;
      display: block;
    }

    .emotion-arrow {
      color: var(--text-dim);
      font-size: 1rem;
      transition: transform 0.3s ease, color 0.3s ease;
    }

    .emotion:hover .emotion-arrow,
    .emotion:active .emotion-arrow {
      color: var(--teal);
      transform: translateX(3px);
    }

    .skip {
      margin-top: auto;
      padding-top: 2rem;
      text-align: center;
      opacity: 0;
      animation: fadeIn 1s ease-out 1.5s forwards;
    }

    .skip a {
      font-size: 0.78rem;
      font-weight: 300;
      color: var(--text-dim);
      text-decoration: none;
      letter-spacing: 0.08em;
      border-bottom: 1px solid transparent;
      padding-bottom: 2px;
      transition: color 0.3s ease, border-color 0.3s ease;
    }

    .skip a:hover {
      color: var(--text-muted);
      border-bottom-color: var(--text-dim);
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="greeting" id="greeting">Good morning</div>

    <div class="orb-wrap">
      <div class="orb"></div>
    </div>

    <h1 class="question">How are you feeling?</h1>
    <p class="subtitle">We'll tailor a practice for this moment.</p>

    <div class="emotions">
      <button class="emotion" data-practice="box"    data-duration="5"  data-emotion="anxious">
        <span class="dot inhale"></span>
        <span class="emotion-text">
          <span class="emotion-name">Anxious</span>
          <span class="emotion-meta">Box Breathing · 5 min · Calm</span>
        </span>
        <span class="emotion-arrow">→</span>
      </button>

      <button class="emotion" data-practice="478"    data-duration="10" data-emotion="restless">
        <span class="dot hold-in"></span>
        <span class="emotion-text">
          <span class="emotion-name">Restless</span>
          <span class="emotion-meta">4 · 7 · 8 · 10 min · Unwind</span>
        </span>
        <span class="emotion-arrow">→</span>
      </button>

      <button class="emotion" data-practice="wimhof" data-duration="5"  data-emotion="foggy">
        <span class="dot hold-out"></span>
        <span class="emotion-text">
          <span class="emotion-name">Foggy</span>
          <span class="emotion-meta">Wim Hof · 5 min · Energize</span>
        </span>
        <span class="emotion-arrow">→</span>
      </button>

      <button class="emotion" data-practice="nadi"   data-duration="10" data-emotion="scattered">
        <span class="dot exhale"></span>
        <span class="emotion-text">
          <span class="emotion-name">Scattered</span>
          <span class="emotion-meta">Nadi Sodhana · 10 min · Focus</span>
        </span>
        <span class="emotion-arrow">→</span>
      </button>

      <button class="emotion" data-practice="free"   data-duration="5"  data-emotion="ease">
        <span class="dot ease"></span>
        <span class="emotion-text">
          <span class="emotion-name">At ease</span>
          <span class="emotion-meta">Choose your own practice</span>
        </span>
        <span class="emotion-arrow">→</span>
      </button>
    </div>

    <div class="skip">
      <a href="app.html">I know what I want →</a>
    </div>
  </div>

  <script>
    const hour = new Date().getHours();
    const greeting = document.getElementById('greeting');
    if      (hour < 5)  greeting.textContent = 'Good night';
    else if (hour < 12) greeting.textContent = 'Good morning';
    else if (hour < 17) greeting.textContent = 'Good afternoon';
    else if (hour < 21) greeting.textContent = 'Good evening';
    else                greeting.textContent = 'Good night';

    document.querySelectorAll('.emotion').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.emotion').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');

        const { practice, duration, emotion } = btn.dataset;

        if (practice === 'free') {
          window.location.href = 'app.html';
          return;
        }

        const params = new URLSearchParams({ practice, duration, emotion });
        window.location.href = `app.html?${params}`;
      });
    });
  </script>
</body>
</html>
